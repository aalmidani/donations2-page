<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<title>جدول التبرعات</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f6f8;
  padding: 40px;
}
.container {
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
h2 {
  margin-bottom: 15px;
}
.buttons {
  margin-bottom: 20px;
}
button {
  padding: 10px 18px;
  margin-left: 10px;
  border: none;
  border-radius: 6px;
  background: #2d89ef;
  color: white;
  font-size: 15px;
  cursor: pointer;
}
button:hover {
  background: #1b5fbf;
}
.search {
  margin-bottom: 15px;
}
input {
  padding: 10px;
  width: 250px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}
th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}
th {
  background: #f2f2f2;
}

/* نافذة منبثقة */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0; top: 0;
  width: 100%; height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.5);
}
.modal-content {
  background: white;
  margin: 50px auto;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 1000px;
  max-height: 80%;
  overflow: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.close-btn {
  background: #d9534f;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>جدول التبرعات</h2>

<div class="buttons">
  <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vRQBH8iAEgXSTQ7Dcj67tg20bR4jOSmiUFdcIv1WFxYwZ8YiBa-dJfMGc8Aay-DJO0pEr-sQON28cwQ/pub?output=xlsx">
    <button>تحميل Excel</button>
  </a>

  <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vRQBH8iAEgXSTQ7Dcj67tg20bR4jOSmiUFdcIv1WFxYwZ8YiBa-dJfMGc8Aay-DJO0pEr-sQON28cwQ/pub?output=pdf">
    <button>تحميل PDF</button>
  </a>

  <button onclick="openModal()">عرض الجدول بالكامل</button>
</div>

<div class="search">
  <input type="text" id="searchInput" placeholder="بحث باسم المتبرع..." onkeyup="searchTable()">
</div>

<table id="donationTable">
<thead>
<tr>
  <th>التسلسل</th>
  <th>اسم المتبرع</th>
  <th>التبرع بالليرة السورية</th>
  <th>التبرع بالدولار</th>
  <th>متفرقات</th>
</tr>
</thead>
<tbody id="tableBody">
</tbody>
</table>

</div>

<!-- النافذة المنبثقة -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">إغلاق</button>
    <div id="modalTableContainer"></div>
  </div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQBH8iAEgXSTQ7Dcj67tg20bR4jOSmiUFdcIv1WFxYwZ8YiBa-dJfMGc8Aay-DJO0pEr-sQON28cwQ/pub?output=csv";

fetch(url)
  .then(r => r.text())
  .then(data => {
    let rows = data.split("\n").slice(1);
    rows.forEach(row => {
      let cols = row.split(",");
      if(cols.length > 1){
        document.getElementById("tableBody").innerHTML += `
        <tr>
          <td>${cols[0]||""}</td>
          <td>${cols[1]||""}</td>
          <td>${cols[2]||""}</td>
          <td>${cols[3]||""}</td>
          <td>${cols[4]||""}</td>
        </tr>`;
      }
    });
  });

function searchTable(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let table = document.getElementById("donationTable");
  let tr = table.getElementsByTagName("tr");
  for(let i=1; i<tr.length; i++){
    let td = tr[i].getElementsByTagName("td")[1];
    if(td){
      let txt = td.textContent || td.innerText;
      tr[i].style.display = txt.toLowerCase().indexOf(input) > -1 ? "" : "none";
    }
  }
}

// فتح وإغلاق النافذة المنبثقة
function openModal() {
  const tableHTML = document.getElementById("donationTable").outerHTML;
  document.getElementById("modalTableContainer").innerHTML = tableHTML;
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
